description = """
Polecat work lifecycle: assignment → implementation → merge queue → verdict → done.

## Contract

You are an event-driven worker:
1. Receive work via hook (formula checklist + issue)
2. Work through steps in order
3. Submit MR, enter awaiting_verdict
4. Refinery sends MERGED → `gt done` (exit) or FIX_NEEDED → fix and resubmit
5. Only exit when refinery confirms merge

**You do NOT:** push to main, close your own issue, or fix pre-existing failures on main.

**Speed:** Run full gates after rebasing (pre-verify). Enables refinery fast-path (~5s merge).

**If stuck >15 min:** `gt escalate` or mail Witness. Don't spin."""
formula = "mol-polecat-work"
version = 10

[[steps]]
id = "load-context"
title = "Load context and verify assignment"
description = """
```bash
gt prime && bd prime          # Load context
gt hook                       # Check assignment
bd show {{issue}}             # Read issue details
gt mail inbox                 # Check for handoff/context messages
```

**Prior merge failure?** If bead notes contain "MERGE REJECTION":
- Read failure details (Failure-Type, Error, Branch)
- If prior branch exists, check it out instead of creating new:
  `git fetch origin && git checkout <branch> && git rebase origin/{{base_branch}}`

**Understand requirements:** What needs doing? What does "done" look like?
If blocked or unclear: `gt mail send <rig>/witness -s "HELP: Unclear requirements" -m "Issue: {{issue}}"`

**Exit:** You understand the work and can begin."""

[[steps]]
id = "branch-setup"
title = "Set up working branch"
needs = ["load-context"]
description = """
```bash
git status && git branch --show-current
```

**If `{{prior_branch}}` is set** (prior attempt exists):
```bash
git fetch origin
git checkout -b polecat/<name> origin/{{base_branch}}
git cherry-pick origin/{{base_branch}}..origin/{{prior_branch}}
```
Prior failure: {{prior_failure}} — fix the issues, don't reimplement from scratch.

**If no prior branch:**
```bash
git fetch origin
git checkout -b polecat/<name> origin/{{base_branch}}
```

**Clean up dirty state:** commit relevant changes or stash/discard unrelated ones.

**Sync:** `git fetch origin && git rebase origin/{{base_branch}}`

**Setup (if configured):** `{{setup_command}}`

**Exit:** Clean feature branch, rebased on latest {{base_branch}}, deps installed."""

[[steps]]
id = "implement"
title = "Implement the solution"
needs = ["branch-setup"]
description = """
Follow codebase conventions. Atomic commits. Stay scoped to {{issue}}.

**Persist findings (session survival):**
```bash
bd update {{issue}} --notes "Findings: <what you discovered>"
bd update {{issue}} --design "<structured findings>"
```
Do this BEFORE closing steps. If session dies, findings survive.

**Report-only tasks** (audits, reviews): persist ALL findings to bead — they ARE your deliverable.

**Commit frequently:**
```bash
git add <files> && git commit -m "<type>: <description> ({{issue}})"
```
Types: feat, fix, refactor, test, docs, chore

**Discovered work outside scope:**
```bash
bd create --title "Found: <description>" --type bug --priority 2
```

**If stuck >15 min:** mail Witness with issue, problem, and what you tried.

**Exit:** All changes committed (code) or findings persisted (reports)."""

[[steps]]
id = "self-review"
title = "Self-review changes"
needs = ["implement"]
description = """
**Option A (recommended):** `/review --branch` — fix CRITICAL/MAJOR findings.

**Option B (manual):**
```bash
git diff origin/{{base_branch}}...HEAD
git log --oneline origin/{{base_branch}}..HEAD
git diff --stat origin/{{base_branch}}...HEAD   # Only relevant files should appear
```
Check for: bugs, security issues, style problems, cruft (debug prints, TODOs).
Fix issues now. Remove unintended changes to unrelated files.

**Exit:** Changes clean, Grade B+ if using /review."""

[[steps]]
id = "build-check"
title = "Build and sanity check"
needs = ["self-review"]
description = """
Catch obvious problems before submitting to merge queue.

**Build (REQUIRED):**
```bash
{{build_command}}
{{setup_command}}
{{typecheck_command}}
```
If any command is empty, check CLAUDE.md/AGENTS.md for project gates. Do NOT silently skip.

If build fails: fix it. Do NOT submit broken code.

**Targeted tests (OPTIONAL — if you modified test files):**
```bash
{{test_command}} --filter "RelevantTests"
```

**Lint (OPTIONAL):** `{{lint_command}}`

**Exit:** Code compiles, obvious regressions caught."""

[[steps]]
id = "commit-changes"
title = "Commit all implementation changes"
needs = ["build-check"]
description = """
**NEVER discard implementation work** with `git checkout -- .` or `git restore .`.

```bash
git status
# If uncommitted changes exist:
git add -A && git commit -m "<type>: <descriptive message> ({{issue}})"
```

**HARD GATE — verify commits exist:**
```bash
git log origin/{{base_branch}}..HEAD --oneline
```
Must show ≥1 commit. If empty: go back to implement. If genuinely no code changes
needed, run `gt done --status DEFERRED`.

**Verify clean:** `git status` → "nothing to commit, working tree clean"

**Report-only tasks:** Verify findings persisted with `bd show {{issue}}`.
Use `gt done --cleanup-status clean` for no-commit tasks.

**Exit:** Working tree clean + commits ahead of origin/{{base_branch}} (or report persisted)."""

[[steps]]
id = "pre-verify"
title = "Pre-merge rebase verification"
needs = ["commit-changes"]
description = """
Rebase + full gate suite enables refinery fast-path merge (~5s vs minutes).

```bash
git fetch origin {{base_branch}}
git rebase origin/{{base_branch}}
```
If conflicts: resolve carefully, re-run build. If stuck, mail Witness.

**Run ALL gates on rebased result:**
```bash
{{build_command}}
{{typecheck_command}}
{{lint_command}}
{{test_command}}
```
Check CLAUDE.md/AGENTS.md if commands are empty. Do NOT silently skip.

If any gate fails: fix, commit, re-run from rebase. Do NOT use --pre-verified if gates failed.

**Skip OK:** If this step takes too long, use `gt done` without --pre-verified.
Refinery runs gates normally (slower but correct).

**Exit:** Branch rebased on latest origin/{{base_branch}}, all gates pass."""

[[steps]]
id = "submit-mr"
title = "Submit MR and enter awaiting_verdict"
needs = ["pre-verify"]
description = """
**Pre-flight (HARD GATE):**
```bash
git log origin/{{base_branch}}..HEAD --oneline   # Must show ≥1 commit
```

**Report-only tasks (no commits):** `gt done --cleanup-status clean` — skip remaining steps.

**Push and submit:**
```bash
git push origin HEAD
gt mq submit {{issue}}
```
Track the MR bead ID from output — needed for resubmission.

**State:** You are now in `awaiting_verdict`. Refinery will send MERGED or FIX_NEEDED.

**Exit:** MR submitted, polecat in awaiting_verdict."""

[[steps]]
id = "await-verdict"
title = "Wait for refinery verdict"
needs = ["submit-mr"]
description = """
```bash
gt mail inbox                 # Check for MERGED or FIX_NEEDED
```
If no verdict: `gt mol step await-signal --agent-bead <your-agent-bead> --backoff-base 30s --backoff-mult 2 --backoff-max 5m`

**On MERGED:** Proceed to self-clean.

**On FIX_NEEDED:**
1. Read failure details from mail and `bd show {{issue}}`
2. Fix the code, commit: `git commit -m "fix: address <failure-type> ({{issue}})"`
3. Re-run the failing check locally
4. Rebase and push:
   ```bash
   git fetch origin {{base_branch}} && git rebase origin/{{base_branch}}
   git push origin HEAD --force-with-lease
   ```
5. Resubmit: `gt mq submit {{issue}} --resubmit`
6. Loop back to awaiting_verdict

**Max retries:** If Attempt-Number ≥ 3, escalate to Witness — do NOT keep retrying.

**Context filling:** `gt handoff -s "Awaiting verdict for {{issue}}" -m "MR submitted. Attempt: <N>"`

**Exit:** Received MERGED signal."""

[[steps]]
id = "self-clean"
title = "Self-clean after merge confirmation"
needs = ["await-verdict"]
description = """
```bash
gt mail inbox                 # Verify MERGED signal received
```

```bash
# With pre-verification:
gt done --pre-verified
# Without:
gt done
```

**You are GONE after this.** Refinery already merged your work. `gt done` is just cleanup.

**Exit:** Sandbox nuked, session exited."""

[vars]
[vars.issue]
description = "The issue ID assigned to this polecat"
required = true

[vars.base_branch]
description = "The base branch to rebase on and compare against"
default = "main"

[vars.setup_command]
description = "Setup/install command (e.g., pnpm install). Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command (e.g., tsc --noEmit). Empty = skip."
default = ""

[vars.test_command]
description = "Command to run tests. Empty = skip."
default = ""

[vars.lint_command]
description = "Command to run linting. Empty = skip."
default = ""

[vars.build_command]
description = "Command to run build. Empty = skip."
default = ""

[vars.prior_branch]
description = "Branch from prior polecat attempt. Cherry-pick to reuse. Empty = none."
default = ""

[vars.prior_failure]
description = "Failure reason from prior attempt. Empty = unknown/none."
default = ""
