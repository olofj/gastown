# Gas Town Blog — nginx configuration
#
# Serves the static blog on port 80.
# Document root: blog/public/ (output of build.sh)
#
# Install: symlink or copy to /etc/nginx/sites-enabled/gastown-blog.conf
# Reload:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Adjust this path to your gastown repo location
    root /home/olof/gt/gastown/blog/public;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — long cache
    location /css/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Posts and pages
    location / {
        try_files $uri $uri/ =404;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Custom error pages
    error_page 404 /404.html;

    access_log /var/log/nginx/gastown-blog.access.log;
    error_log /var/log/nginx/gastown-blog.error.log;
}
